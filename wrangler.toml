name = "imgursendbot"
main = "src/index.js"
compatibility_date = "2024-01-01"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

# Bot credentials — set these as secrets (see README), or replace inline for quick testing.
# To set secrets:
#   wrangler secret put TELEGRAM_BOT_TOKEN
#   wrangler secret put IMGUR_CLIENT_IDS   ← comma-separated list, e.g. "id1,id2,id3"
#
# For local dev you can also use a .dev.vars file (never commit it):
#   TELEGRAM_BOT_TOKEN=123456:ABC...
#   IMGUR_CLIENT_IDS=id1,id2,id3

# KV namespace for media group (album) state.
# Create with: wrangler kv namespace create MEDIA_GROUPS
# Then fill in the id below, and optionally a preview_id for local dev.
[[kv_namespaces]]
binding = "MEDIA_GROUPS"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_YOUR_KV_NAMESPACE_PREVIEW_ID"
