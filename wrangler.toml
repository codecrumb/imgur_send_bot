name = "imgursendbot"
main = "src/index.js"
compatibility_date = "2024-01-01"
account_id = "19113d327ef2f9d716030f95f19fb45b"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

# Bot credentials — set these as secrets (see README), or replace inline for quick testing.
# To set secrets:
#   wrangler secret put TELEGRAM_BOT_TOKEN
#   wrangler secret put IMGUR_CLIENT_IDS   ← comma-separated list, e.g. "id1,id2,id3"
#
# For local dev you can also use a .dev.vars file (never commit it):
#   TELEGRAM_BOT_TOKEN=123456:ABC...
#   IMGUR_CLIENT_IDS=id1,id2,id3

[[kv_namespaces]]
binding = "IMGUR_BOT_MEDIA_GROUPS"
id = "bf5d70b9337a40598d80e7d13f94c742"

[[d1_databases]]
binding = "USER_PREFS_DB"
database_name = "media-upload-bot-users"
database_id = "82edb3f2-5282-47d4-b228-64440cb44b84"
